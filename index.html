<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1D9E75">
  <title>Produce Auction Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      -webkit-text-size-adjust: 100%;
    }

    :root {
      --bg-p: #ffffff;
      --bg-s: #f5f5f3;
      --bg-t: #ebebea;
      --text-p: #1a1a18;
      --text-s: #5a5a54;
      --text-t: #999994;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.25);
      --r-md: 8px;
      --r-lg: 12px;
      --green:   #1D9E75;
      --green-l: #E1F5EE;
      --green-d: #085041;
      --green-b: #5DCAA5;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0f0ee; }
      :root {
        --bg-p:    #252523;
        --bg-s:    #1a1a18;
        --bg-t:    #2e2e2c;
        --text-p:  #f0f0ee;
        --text-s:  #9a9a94;
        --text-t:  #666660;
        --border:  rgba(255,255,255,0.10);
        --border-md: rgba(255,255,255,0.22);
        --green-l: #0a2e22;
        --green-d: #9FE1CB;
        --green-b: #1D9E75;
      }
    }

    #root { max-width: 500px; margin: 0 auto; }

    #app-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #999; font-size: 14px;
    }

    input, select, button, textarea { font-family: inherit; }

    /* Hide spinner on number inputs */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Print styles ── */
    @media print {
      .no-print { display: none !important; }
      .print-show { display: block !important; }
      body { background: white !important; color: black !important; font-size: 12pt; }
      #root { max-width: 100% !important; }
      .lot-card { break-inside: avoid; border: 1px solid #ccc !important; margin-bottom: 8pt !important; }
    }
    .print-show { display: none; }
  </style>
</head>
<body>

  <div id="app-loading">Loading…</div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    /* ── Constants ───────────────────────────────────────────── */
    const DEFAULT_PRODUCE = [
      'Acorn Squash','Apples','Asparagus','Avocados','Bananas','Beets',
      'Bell Peppers','Blueberries','Broccoli','Brussels Sprouts','Butternut Squash',
      'Cabbage','Cantaloupe','Carrots','Cauliflower','Celery','Cherries',
      'Collard Greens','Corn','Cucumbers','Eggplant','Garlic','Grapes',
      'Green Beans','Green Onions','Honeydew','Iceberg Lettuce','Jalapeños',
      'Kale','Kohlrabi','Lemons','Limes','Mangos','Mushrooms','Nectarines',
      'Okra','Onions','Oranges','Parsnips','Peaches','Pears','Peas',
      'Pineapples','Plums','Potatoes','Pumpkins','Radishes','Raspberries',
      'Red Onions','Romaine Lettuce','Roma Tomatoes','Russet Potatoes',
      'Spinach','Strawberries','Summer Squash','Sweet Corn','Sweet Peppers',
      'Sweet Potatoes','Swiss Chard','Tomatoes','Turnips','Watermelon',
      'Yellow Squash','Yellow Tomatoes','Zucchini'
    ];

    const UNITS = [
      '25 lb. box','40 lb. box','50 lb. bag','bu. crate','bunch',
      'flat','half-box','lug','peck','pint flat','quart flat',
      'bag','crate','sack','barrel','carton','hamper','wirebound crate'
    ];

    const GRADES = ['No. 1','No. 2','No. 3','Canners'];

    const GS = {
      'No. 1':  { bg:'#E1F5EE', color:'#085041', border:'#5DCAA5' },
      'No. 2':  { bg:'#E6F1FB', color:'#0C447C', border:'#85B7EB' },
      'No. 3':  { bg:'#EEEDFE', color:'#26215C', border:'#AFA9EC' },
      'Canners':{ bg:'#FAEEDA', color:'#633806', border:'#EF9F27' },
    };

    /* ── Helpers ─────────────────────────────────────────────── */
    const fmt      = v => '$' + (parseFloat(v)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    const nowDate  = () => new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const nowShort = () => new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const BLANK    = { item:'', unit:'25 lb. box', grade:'No. 1', grower:'', qty:'', price:'', total:'' };

    /* ── localStorage wrapper ────────────────────────────────── */
    const store = {
      get: key => { try { const v=localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (key,val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
    };

    /* ════════════════════════════════════════════════════════════
       MAIN APP
    ════════════════════════════════════════════════════════════ */
    function ProduceTracker() {
      const [tab,        setTab]        = useState('add');
      const [db,         setDb]         = useState(DEFAULT_PRODUCE);
      const [savedLists, setSavedLists] = useState([]);
      const [listName,   setListName]   = useState('Auction — ' + nowShort());
      const [lots,       setLots]       = useState([]);
      const [form,       setForm]       = useState({...BLANK});
      const [sugg,       setSugg]       = useState([]);
      const [editId,     setEditId]     = useState(null);
      const [toast,      setToast]      = useState('');
      const [loaded,     setLoaded]     = useState(false);
      const [editName,   setEditName]   = useState(false);
      const [newItem,    setNewItem]    = useState('');
      const [customUnit, setCustomUnit] = useState('');
      const itemRef = useRef(null);
      const nameRef = useRef(null);

      /* Load from localStorage on mount */
      useEffect(() => {
        const pdb  = store.get('pat_db');
        if (pdb)  setDb(pdb);

        const alst = store.get('pat_lists');
        if (alst) setSavedLists(alst);

        const cur  = store.get('pat_current');
        if (cur) {
          setListName(cur.name || 'Auction — ' + nowShort());
          setLots(cur.lots || []);
        }

        setLoaded(true);
        document.getElementById('app-loading').style.display = 'none';
      }, []);

      /* Auto-save current session whenever lots or name change */
      useEffect(() => {
        if (!loaded) return;
        store.set('pat_current', { name: listName, lots });
      }, [lots, listName, loaded]);

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2000); };

      /* ── Autocomplete ── */
      const handleItemInput = val => {
        setForm(f => ({...f, item: val}));
        setSugg(val.length >= 1
          ? db.filter(p => p.toLowerCase().includes(val.toLowerCase())).slice(0, 8)
          : []);
      };

      const pickSugg = s => { setForm(f => ({...f, item: s})); setSugg([]); };

      /* ── Calculated fields ── */
      const handlePrice = val => {
        const p = parseFloat(val), q = parseFloat(form.qty);
        setForm(f => ({...f, price: val, total: (!isNaN(p) && !isNaN(q)) ? (p*q).toFixed(2) : f.total}));
      };

      const handleQty = val => {
        const p = parseFloat(form.price), q = parseFloat(val);
        setForm(f => ({...f, qty: val, total: (!isNaN(p) && !isNaN(q)) ? (p*q).toFixed(2) : f.total}));
      };

      const handleTotal = val => {
        const q = parseFloat(form.qty), t = parseFloat(val);
        setForm(f => ({...f, total: val, price: (!isNaN(q) && q > 0 && !isNaN(t)) ? (t/q).toFixed(2) : f.price}));
      };

      /* ── Save lot ── */
      const saveLot = () => {
        if (!form.item.trim()) { itemRef.current && itemRef.current.focus(); return; }

        const unitVal = form.unit === '__custom__' ? (customUnit.trim() || 'custom') : form.unit;

        // Auto-add new produce to DB
        if (!db.some(p => p.toLowerCase() === form.item.trim().toLowerCase())) {
          const ndb = [...db, form.item.trim()].sort((a,b) => a.localeCompare(b));
          setDb(ndb);
          store.set('pat_db', ndb);
        }

        const lot = {
          id:     editId || Date.now(),
          item:   form.item.trim(),
          unit:   unitVal,
          grade:  form.grade,
          grower: form.grower.trim(),
          qty:    form.qty,
          price:  form.price,
          total:  form.total || '0',
        };

        if (editId) {
          setLots(ls => ls.map(l => l.id === editId ? lot : l));
          setEditId(null);
          showToast('Lot updated');
        } else {
          setLots(ls => [...ls, lot]);
          showToast('Saved ✓');
        }

        // Keep unit/grade/grower for fast repeat entry
        setForm(f => ({...BLANK, unit: f.unit, grade: f.grade, grower: f.grower}));
        setCustomUnit('');
        setSugg([]);
        setTimeout(() => itemRef.current && itemRef.current.focus(), 80);
      };

      const startEdit = lot => {
        const isCustom = !UNITS.includes(lot.unit);
        setForm({ item: lot.item, unit: isCustom ? '__custom__' : lot.unit,
          grade: lot.grade, grower: lot.grower, qty: lot.qty, price: lot.price, total: lot.total });
        if (isCustom) setCustomUnit(lot.unit);
        setEditId(lot.id);
        setTab('add');
        setTimeout(() => itemRef.current && itemRef.current.focus(), 80);
      };

      const deleteLot  = id => setLots(ls => ls.filter(l => l.id !== id));
      const runTotal   = lots.reduce((s, l) => s + parseFloat(l.total || 0), 0);

      /* ── List management ── */
      const saveList = () => {
        if (!lots.length) { showToast('No lots to save'); return; }
        const list = { id: Date.now(), name: listName, date: nowDate(), lots: [...lots], total: runTotal.toFixed(2) };
        const nl   = [list, ...savedLists];
        setSavedLists(nl);
        store.set('pat_lists', nl);
        showToast('List saved!');
      };

      const loadList = list => {
        setListName(list.name);
        setLots(list.lots);
        setTab('add');
        showToast('List loaded');
      };

      const deleteList = id => {
        const nl = savedLists.filter(l => l.id !== id);
        setSavedLists(nl);
        store.set('pat_lists', nl);
        showToast('Deleted');
      };

      const newList = () => {
        setListName('Auction — ' + nowShort());
        setLots([]);
        setEditId(null);
        setForm({...BLANK});
        setTab('add');
        showToast('New list started');
      };

      /* ── Export ── */
      const exportLines = [
        listName,
        nowDate(),
        '='.repeat(44),
        ...lots.map((l, i) =>
          String(i+1).padStart(2,'0') + '  ' + l.item + '\n' +
          '    Grade: ' + l.grade + '  |  Grower: ' + (l.grower||'—') + '  |  Qty: ' + (l.qty||'—') + ' × ' + l.unit + '\n' +
          '    Lot total: ' + fmt(l.total)
        ),
        '='.repeat(44),
        'TOTAL: ' + fmt(runTotal) + '  (' + lots.length + ' lot' + (lots.length !== 1 ? 's' : '') + ')',
      ];
      const exportText = exportLines.join('\n\n');

      const copyExport = () => {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(exportText).then(() => showToast('Copied!'));
        } else {
          const ta = document.createElement('textarea');
          ta.value = exportText;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('Copied!');
        }
      };

      const doPrint = () => window.print();

      /* ── DB management ── */
      const addDbItem = () => {
        const v = newItem.trim();
        if (!v || db.some(p => p.toLowerCase() === v.toLowerCase())) { setNewItem(''); return; }
        const ndb = [...db, v].sort((a,b) => a.localeCompare(b));
        setDb(ndb);
        store.set('pat_db', ndb);
        setNewItem('');
        showToast('Added!');
      };

      const removeDbItem = item => {
        const ndb = db.filter(p => p !== item);
        setDb(ndb);
        store.set('pat_db', ndb);
      };

      /* ── Shared styles ── */
      const inp = {
        background: 'var(--bg-s)', border: '0.5px solid var(--border)',
        borderRadius: 'var(--r-md)', padding: '9px 11px', fontSize: 14,
        color: 'var(--text-p)', outline: 'none', width: '100%', fontFamily: 'inherit',
      };
      const lbl = { fontSize: 11, color: 'var(--text-t)', marginBottom: 3, display: 'block' };

      /* ════════════════════════════════════════════════════════
         RENDER
      ════════════════════════════════════════════════════════ */
      return (
        <div style={{fontFamily:'inherit', paddingBottom: 76}}>

          {/* ── Toast notification ── */}
          {toast && (
            <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',
              background:'#1D9E75',color:'#fff',padding:'8px 22px',borderRadius:24,
              fontSize:14,fontWeight:500,zIndex:1000,pointerEvents:'none',whiteSpace:'nowrap'}}>
              {toast}
            </div>
          )}

          {/* ── Print-only header ── */}
          <div className="print-show" style={{padding:'0 0 12px',borderBottom:'1px solid #ccc',marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:600}}>{listName}</div>
            <div style={{fontSize:13,color:'#666',marginTop:4}}>{nowDate()} · {lots.length} lots · {fmt(runTotal)}</div>
          </div>

          {/* ── Sticky header ── */}
          <div className="no-print" style={{position:'sticky',top:0,zIndex:50,
            background:'var(--bg-p)',borderBottom:'0.5px solid var(--border)',padding:'10px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
              {editName ? (
                <input ref={nameRef} value={listName} onChange={e => setListName(e.target.value)}
                  onBlur={() => setEditName(false)}
                  onKeyDown={e => e.key === 'Enter' && setEditName(false)}
                  style={{...inp, fontSize:15, fontWeight:500, padding:'3px 6px', width:'auto', flex:1, marginRight:8}}
                  autoFocus />
              ) : (
                <span onClick={() => { setEditName(true); setTimeout(() => nameRef.current && nameRef.current.select(), 50); }}
                  style={{fontSize:15,fontWeight:500,color:'var(--text-p)',cursor:'pointer',
                    display:'flex',alignItems:'center',gap:6}}>
                  {listName}
                  <span style={{fontSize:11,color:'var(--text-t)'}}>✎</span>
                </span>
              )}
              <span style={{fontSize:20,fontWeight:500,color:'var(--green)'}}>{fmt(runTotal)}</span>
            </div>
            <span style={{fontSize:12,color:'var(--text-s)'}}>
              {lots.length} lot{lots.length !== 1 ? 's' : ''} · {nowDate()}
            </span>
          </div>


          {/* ═══════════════════ TAB: ADD LOT ═══════════════════ */}
          {tab === 'add' && (
            <div style={{padding:'12px 16px'}}>

              {/* Form card */}
              <div className="no-print" style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                border:'0.5px solid var(--border)',padding:14,marginBottom:14}}>

                <div style={{fontSize:11,fontWeight:500,letterSpacing:'0.06em',
                  color:'var(--text-s)',marginBottom:10}}>
                  {editId ? '✎  EDIT LOT' : 'NEW LOT'}
                </div>

                {/* Produce item w/ autocomplete */}
                <div style={{marginBottom:10,position:'relative'}}>
                  <label style={lbl}>PRODUCE ITEM</label>
                  <input ref={itemRef} value={form.item} onChange={e => handleItemInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && saveLot()}
                    placeholder="Start typing to search…"
                    style={inp} autoComplete="off" autoCorrect="off" />
                  {sugg.length > 0 && (
                    <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,
                      background:'var(--bg-p)',border:'0.5px solid var(--border-md)',
                      borderRadius:'var(--r-md)',zIndex:100,overflow:'hidden',
                      boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
                      {sugg.map(s => (
                        <div key={s}
                          onMouseDown={() => pickSugg(s)}
                          onTouchStart={e => { e.preventDefault(); pickSugg(s); }}
                          style={{padding:'11px 14px',fontSize:14,cursor:'pointer',
                            borderBottom:'0.5px solid var(--border)',color:'var(--text-p)'}}>
                          {s}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Unit + Grower */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                  <div>
                    <label style={lbl}>UNIT TYPE</label>
                    <select value={form.unit} onChange={e => setForm(f => ({...f, unit: e.target.value}))}
                      style={{...inp, cursor:'pointer'}}>
                      {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                      <option value="__custom__">Custom…</option>
                    </select>
                  </div>
                  <div>
                    <label style={lbl}>GROWER #</label>
                    <input value={form.grower} onChange={e => setForm(f => ({...f, grower: e.target.value}))}
                      placeholder="e.g. 4471" style={inp} />
                  </div>
                </div>

                {/* Custom unit field */}
                {form.unit === '__custom__' && (
                  <div style={{marginBottom:10}}>
                    <label style={lbl}>CUSTOM UNIT</label>
                    <input value={customUnit} onChange={e => setCustomUnit(e.target.value)}
                      placeholder="e.g. wooden crate" style={inp} />
                  </div>
                )}

                {/* Grade quick-tap buttons */}
                <div style={{marginBottom:10}}>
                  <label style={lbl}>GRADE</label>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
                    {GRADES.map(g => {
                      const gs = GS[g];
                      const on = form.grade === g;
                      return (
                        <button key={g} onClick={() => setForm(f => ({...f, grade: g}))} style={{
                          padding:'9px 4px', fontSize:12, fontWeight:500,
                          borderRadius:'var(--r-md)',
                          border: on ? '1.5px solid ' + gs.border : '0.5px solid var(--border)',
                          background: on ? gs.bg : 'var(--bg-s)',
                          color: on ? gs.color : 'var(--text-s)',
                          cursor:'pointer', transition:'all 0.1s'
                        }}>{g}</button>
                      );
                    })}
                  </div>
                </div>

                {/* Qty + Price per unit */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <label style={lbl}>QTY</label>
                    <input value={form.qty} onChange={e => handleQty(e.target.value)}
                      type="number" inputMode="decimal" placeholder="0" style={inp} />
                  </div>
                  <div>
                    <label style={lbl}>PRICE / UNIT $</label>
                    <input value={form.price} onChange={e => handlePrice(e.target.value)}
                      type="number" inputMode="decimal" placeholder="0.00" style={inp} />
                  </div>
                </div>

                {/* Total lot cost */}
                <div style={{marginBottom:12}}>
                  <label style={lbl}>TOTAL LOT COST $</label>
                  <input value={form.total} onChange={e => handleTotal(e.target.value)}
                    type="number" inputMode="decimal"
                    placeholder="or enter lot total directly"
                    style={{...inp, background:'var(--green-l)', border:'0.5px solid var(--green-b)',
                      color:'var(--green-d)', fontSize:17, fontWeight:500}} />
                </div>

                {/* Buttons */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:8}}>
                  <button
                    onClick={() => { setForm(f => ({...BLANK, unit:f.unit, grade:f.grade, grower:f.grower})); setEditId(null); setSugg([]); }}
                    style={{padding:11,fontSize:14,borderRadius:'var(--r-md)',
                      border:'0.5px solid var(--border-md)',
                      background:'var(--bg-s)',color:'var(--text-s)',cursor:'pointer'}}>
                    Clear
                  </button>
                  <button onClick={saveLot} style={{padding:11,fontSize:15,fontWeight:500,
                    borderRadius:'var(--r-md)',border:'none',
                    background:'var(--green)',color:'#fff',cursor:'pointer'}}>
                    {editId ? 'Update Lot' : 'Save + Next ↵'}
                  </button>
                </div>
              </div>

              {/* Saved lots list */}
              {lots.length > 0 ? (
                <div>
                  <div className="no-print" style={{fontSize:11,fontWeight:500,letterSpacing:'0.06em',
                    color:'var(--text-s)',marginBottom:8}}>
                    SAVED LOTS ({lots.length})
                  </div>

                  {[...lots].reverse().map(lot => {
                    const gs = GS[lot.grade] || GS['No. 1'];
                    return (
                      <div key={lot.id} className="lot-card" style={{background:'var(--bg-p)',
                        borderRadius:'var(--r-lg)',border:'0.5px solid var(--border)',
                        padding:'10px 14px',marginBottom:8}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                          <span style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{lot.item}</span>
                          <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,
                            background:gs.bg,color:gs.color,fontWeight:500,flexShrink:0,marginLeft:8}}>
                            {lot.grade}
                          </span>
                        </div>
                        <div style={{fontSize:12,color:'var(--text-s)',marginBottom:6}}>
                          <b style={{color:'var(--text-p)',fontWeight:500}}>{lot.qty||'—'}</b> × {lot.unit}
                          {lot.price ? <span style={{marginLeft:8}}>{fmt(lot.price)}/unit</span> : ''}
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                          paddingTop:6,borderTop:'0.5px solid var(--border)'}}>
                          <div style={{display:'flex',gap:10,alignItems:'center'}}>
                            {lot.grower && (
                              <span style={{fontSize:11,background:'var(--bg-s)',color:'var(--text-s)',
                                padding:'2px 8px',borderRadius:20}}>
                                GR {lot.grower}
                              </span>
                            )}
                            <button className="no-print" onClick={() => startEdit(lot)}
                              style={{fontSize:12,color:'#185FA5',background:'none',border:'none',cursor:'pointer',padding:0}}>
                              Edit
                            </button>
                            <button className="no-print" onClick={() => deleteLot(lot.id)}
                              style={{fontSize:12,color:'#A32D2D',background:'none',border:'none',cursor:'pointer',padding:0}}>
                              Remove
                            </button>
                          </div>
                          <span style={{fontSize:16,fontWeight:500,color:'var(--text-p)'}}>{fmt(lot.total)}</span>
                        </div>
                      </div>
                    );
                  })}

                  {/* Running total bar */}
                  <div style={{background:'var(--bg-t)',borderRadius:'var(--r-md)',
                    padding:'12px 14px',display:'flex',justifyContent:'space-between',
                    alignItems:'center',marginTop:4}}>
                    <span style={{fontSize:14,color:'var(--text-s)'}}>Total ({lots.length} lots)</span>
                    <span style={{fontSize:18,fontWeight:500,color:'var(--text-p)'}}>{fmt(runTotal)}</span>
                  </div>
                </div>
              ) : (
                <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
                  No lots yet — fill out the form above
                </div>
              )}
            </div>
          )}


          {/* ═══════════════════ TAB: MY LISTS ═══════════════════ */}
          {tab === 'lists' && (
            <div style={{padding:'12px 16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span style={{fontSize:14,fontWeight:500,color:'var(--text-p)'}}>Saved Lists</span>
                <button onClick={newList} style={{fontSize:13,padding:'6px 14px',
                  borderRadius:'var(--r-md)',border:'0.5px solid var(--green)',
                  background:'transparent',color:'var(--green)',cursor:'pointer',fontWeight:500}}>
                  + New List
                </button>
              </div>

              <button onClick={saveList} style={{width:'100%',padding:11,fontSize:14,fontWeight:500,
                borderRadius:'var(--r-md)',border:'0.5px solid var(--border-md)',
                background:'var(--bg-p)',color:'var(--text-p)',cursor:'pointer',
                marginBottom:14,display:'flex',justifyContent:'center',gap:8,alignItems:'center'}}>
                <span>Save current list</span>
                <span style={{fontSize:12,color:'var(--text-s)'}}>{lots.length} lots · {fmt(runTotal)}</span>
              </button>

              {savedLists.length === 0 ? (
                <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
                  No saved lists yet
                </div>
              ) : savedLists.map(list => (
                <div key={list.id} style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                  border:'0.5px solid var(--border)',padding:'12px 14px',marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)',marginBottom:2}}>{list.name}</div>
                      <div style={{fontSize:12,color:'var(--text-s)'}}>{list.date} · {list.lots.length} lots</div>
                    </div>
                    <span style={{fontSize:16,fontWeight:500,color:'var(--text-p)',marginLeft:12}}>{fmt(list.total)}</span>
                  </div>
                  <div style={{display:'flex',gap:14,marginTop:8,paddingTop:8,borderTop:'0.5px solid var(--border)'}}>
                    <button onClick={() => loadList(list)}
                      style={{fontSize:13,color:'#185FA5',background:'none',border:'none',cursor:'pointer',padding:0}}>
                      Load
                    </button>
                    <button onClick={() => deleteList(list.id)}
                      style={{fontSize:13,color:'#A32D2D',background:'none',border:'none',cursor:'pointer',padding:0}}>
                      Delete
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}


          {/* ═══════════════════ TAB: PRINT / EXPORT ════════════ */}
          {tab === 'export' && (
            <div style={{padding:'12px 16px'}}>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:12}}>Print / Export</div>
              {lots.length === 0 ? (
                <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
                  Add some lots first
                </div>
              ) : (
                <>
                  <div style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                    border:'0.5px solid var(--border)',padding:14,
                    fontFamily:'monospace',fontSize:12,lineHeight:1.8,
                    color:'var(--text-p)',whiteSpace:'pre-wrap',marginBottom:12,overflowX:'auto'}}>
                    {exportText}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <button onClick={copyExport} style={{padding:11,fontSize:13,fontWeight:500,
                      borderRadius:'var(--r-md)',border:'0.5px solid var(--green)',
                      background:'transparent',color:'var(--green)',cursor:'pointer'}}>
                      Copy text
                    </button>
                    <button onClick={doPrint} style={{padding:11,fontSize:13,fontWeight:500,
                      borderRadius:'var(--r-md)',border:'none',
                      background:'var(--green)',color:'#fff',cursor:'pointer'}}>
                      Print
                    </button>
                  </div>
                </>
              )}
            </div>
          )}


          {/* ═══════════════════ TAB: ITEMS DB ═══════════════════ */}
          {tab === 'db' && (
            <div style={{padding:'12px 16px'}}>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:4}}>Produce Database</div>
              <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>
                {db.length} items · New items save automatically when you add a lot
              </div>

              <div style={{display:'flex',gap:8,marginBottom:14}}>
                <input value={newItem} onChange={e => setNewItem(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addDbItem()}
                  placeholder="Add item manually…"
                  style={{...inp, flex:1, width:'auto'}} />
                <button onClick={addDbItem} style={{padding:'9px 18px',fontSize:14,fontWeight:500,
                  borderRadius:'var(--r-md)',border:'none',background:'var(--green)',
                  color:'#fff',cursor:'pointer',flexShrink:0}}>
                  Add
                </button>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                {db.map(item => (
                  <div key={item} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    background:'var(--bg-p)',border:'0.5px solid var(--border)',
                    borderRadius:'var(--r-md)',padding:'7px 10px'}}>
                    <span style={{fontSize:13,color:'var(--text-p)'}}>{item}</span>
                    <button onClick={() => removeDbItem(item)} style={{fontSize:18,lineHeight:1,
                      color:'var(--text-t)',background:'none',border:'none',
                      cursor:'pointer',padding:'0 0 0 6px'}}>
                      ×
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}


          {/* ── Bottom navigation ── */}
          <div className="no-print" style={{position:'fixed',bottom:0,left:0,right:0,
            background:'var(--bg-p)',borderTop:'0.5px solid var(--border)',
            display:'flex',padding:'8px 0 env(safe-area-inset-bottom, 10px)'}}>
            {[
              { id:'add',    icon:'＋', label:'Add Lot'  },
              { id:'lists',  icon:'☰',  label:'My Lists' },
              { id:'export', icon:'⎙',  label:'Print'    },
              { id:'db',     icon:'⊞',  label:'Items DB' },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                  background:'none',border:'none',cursor:'pointer',padding:'4px 0'}}>
                <span style={{fontSize:22,lineHeight:1,
                  color: tab === t.id ? 'var(--green)' : 'var(--text-t)'}}>
                  {t.icon}
                </span>
                <span style={{fontSize:10,
                  color: tab === t.id ? 'var(--green)' : 'var(--text-t)',
                  fontWeight: tab === t.id ? 600 : 400}}>
                  {t.label}
                </span>
                {tab === t.id && (
                  <div style={{width:4,height:4,borderRadius:'50%',background:'var(--green)'}} />
                )}
              </button>
            ))}
          </div>

        </div>
      );
    }

    /* Mount */
    ReactDOM.createRoot(document.getElementById('root')).render(<ProduceTracker />);
  </script>
</body>
</html>
