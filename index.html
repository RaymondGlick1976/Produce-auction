<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1D9E75">
  <title>Produce Auction Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;-webkit-text-size-adjust:100%}
    :root{
      --bg-p:#fff;--bg-s:#f5f5f3;--bg-t:#ebebea;
      --text-p:#1a1a18;--text-s:#5a5a54;--text-t:#999994;
      --border:rgba(0,0,0,.12);--border-md:rgba(0,0,0,.25);
      --r-md:8px;--r-lg:12px;
      --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;--green-b:#5DCAA5
    }
    @media(prefers-color-scheme:dark){
      body{background:#1a1a18;color:#f0f0ee}
      :root{
        --bg-p:#252523;--bg-s:#1a1a18;--bg-t:#2e2e2c;
        --text-p:#f0f0ee;--text-s:#9a9a94;--text-t:#666660;
        --border:rgba(255,255,255,.10);--border-md:rgba(255,255,255,.22);
        --green-l:#0a2e22;--green-d:#9FE1CB;--green-b:#1D9E75
      }
    }
    #root{max-width:500px;margin:0 auto}
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;color:#999;font-size:14px}
    .spin{width:28px;height:28px;border-radius:50%;border:2.5px solid #ddd;border-top-color:#1D9E75;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes livepulse{0%,100%{opacity:1}50%{opacity:0.3}}
    input,select,button,textarea{font-family:inherit}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    @media print{
      .np{display:none!important}
      .po{display:block!important}
      body{background:#fff!important;color:#000!important}
      #root{max-width:100%!important}
      .lc{break-inside:avoid;border:1px solid #ccc!important;margin-bottom:8pt!important}
    }
    .po{display:none}
  </style>
</head>
<body>
<div id="loading"><div class="spin"></div><span>Connecting to auction…</span></div>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const SB_URL = 'https://lzcymngivtkzcazvuirq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6Y3ltbmdpdnRremNhenZ1aXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDMyNTcsImV4cCI6MjA5MjQ3OTI1N30.Yyz5b3Zc3fnOa4QqlrsrJr_BYPAvmrCiHYmG2n3yv4c';
const sb = supabase.createClient(SB_URL, SB_KEY);

const DEFAULT_UNITS = ['25 lb. box','40 lb. box','50 lb. bag','bu. crate','bunch','flat','half-box',
  'lug','peck','pint flat','quart flat','bag','crate','sack','barrel','carton','hamper','wirebound crate'];
const GRADES = ['No. 1','No. 2','No. 3','Canners'];
const SIZES  = ['N/A','Small','Medium','Large','X-Large'];
const COLORS = ['N/A','Green','Yellow','Red','Mixed'];
const CDOT = { Green:'#1D9E75', Yellow:'#EF9F27', Red:'#E24B4A', Mixed:'#888780' };
const GS = {
  'No. 1':  { bg:'#E1F5EE', fg:'#085041', br:'#5DCAA5' },
  'No. 2':  { bg:'#E6F1FB', fg:'#0C447C', br:'#85B7EB' },
  'No. 3':  { bg:'#EEEDFE', fg:'#26215C', br:'#AFA9EC' },
  'Canners':{ bg:'#FAEEDA', fg:'#633806', br:'#EF9F27' },
};

const fmt      = v => '$' + (parseFloat(v)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const dateStr  = () => new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const shortStr = () => new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
const BLANK = { item:'', unit:'each', grade:'No. 1', size:'N/A', color:'N/A', grower:'', row_no:'', qty:'', price:'', total:'', description:'', is_loaded:false, is_bin_lot:false };

const SID_KEY  = 'pat_last_sid';
const getSid   = () => { try { return localStorage.getItem(SID_KEY); } catch(e) { return null; } };
const setSid   = function(id) { try { localStorage.setItem(SID_KEY, id); } catch(e) {} };

function App() {
  const [tab,       setTab]    = useState('add');
  const [sid,       _setSid]   = useState(null);
  const [sname,     setSname]  = useState('Auction \u2014 ' + shortStr());
  const [sessions,  setSess]   = useState([]);
  const [lots,      setLots]   = useState([]);
  const [pdb,       setPdb]    = useState([]);
  const [units,     setUnits]  = useState(DEFAULT_UNITS);
  const [rows,      setRows]   = useState(['Row 1','Row 2','Row 3','Row 4','Row 5','Row 6']);
  const [form,      setForm]   = useState({...BLANK});
  const [formOpen,  setFO]     = useState(true);
  const [reportView,setRV]     = useState('product');
  const [sugg,      setSugg]   = useState([]);
  const [unitSugg,  setUSugg]  = useState([]);
  const [editId,    setEid]    = useState(null);
  const [delLot,    setDelLot] = useState(null);
  const [delSess,   setDelSess]= useState(null);
  const [toast,     setToast]  = useState('');
  const [toastErr,  setTE]     = useState(false);
  const [ready,     setReady]  = useState(false);
  const [editName,  setEN]     = useState(false);
  const [newProd,   setNP]     = useState('');
  const [newUnit,   setNU]     = useState('');
  const [newRow,    setNR]     = useState('');
  const [custUnit,    setCU]       = useState('');
  const [photoPreview,setPhoPrev]  = useState(null);  // local object URL
  const [photoUrl,    setPhoUrl]   = useState(null);  // uploaded Supabase URL
  const [photoLoading,setPhoLoad]  = useState(false);
  const [bookProds,   setBookProds]= useState([]);   // names from Books products catalog
  const [orders,      setOrders]   = useState([]);    // buy-list rows for current session
  const [boItem,      setBoItem]   = useState('');
  const [boQty,       setBoQty]    = useState('');
  const [boUnit,      setBoUnit]   = useState('each');
  const [boSugg,      setBoSugg]   = useState([]);
  const [logFor,      setLogFor]   = useState(null);
  const [logQty,      setLogQty]   = useState('');
  const [logPrice,    setLogPrice] = useState('');
  const [delOrder,    setDelOrder] = useState(null);
  const itemRef  = useRef(null);
  const unitRef  = useRef(null);
  const nameRef  = useRef(null);
  const chanRef  = useRef(null);
  const photoRef = useRef(null);

  const notify = (msg, err) => {
    setToast(msg); setTE(!!err);
    setTimeout(() => setToast(''), 2500);
  };

  // ── Photo helpers ──
  var resizeToWebP = function(file, maxPx, quality) {
    return new Promise(function(resolve) {
      var img = new Image();
      var objUrl = URL.createObjectURL(file);
      img.onload = function() {
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxPx / Math.max(w, h));
        var canvas = document.createElement('canvas');
        canvas.width  = Math.round(w * scale);
        canvas.height = Math.round(h * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(objUrl);
        canvas.toBlob(function(blob) { resolve(blob); }, 'image/webp', quality || 0.85);
      };
      img.src = objUrl;
    });
  };

  var handlePhotoSelect = async function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    // Show preview immediately
    var prev = URL.createObjectURL(file);
    setPhoPrev(prev);
    setPhoUrl(null);
    setPhoLoad(true);
    // Resize + convert + upload
    try {
      var blob = await resizeToWebP(file, 1200, 0.85);
      var path = 'lots/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.webp';
      var up = await sb.storage.from('lot-photos').upload(path, blob, { contentType: 'image/webp' });
      if (up.error) { notify('Photo upload failed', true); setPhoLoad(false); return; }
      var pub = sb.storage.from('lot-photos').getPublicUrl(path);
      setPhoUrl(pub.data.publicUrl);
    } catch(err) {
      notify('Photo upload failed', true);
    }
    setPhoLoad(false);
  };

  var clearPhoto = function() {
    if (photoPreview) URL.revokeObjectURL(photoPreview);
    setPhoPrev(null); setPhoUrl(null); setPhoLoad(false);
    if (photoRef.current) photoRef.current.value = '';
  };

  // Defined before useEffect so init() can call them safely
  var makeSession = async function(name) {
    var n = name || ('Auction \u2014 ' + shortStr());
    var r = await sb.from('auction_sessions').insert({ name: n }).select().single();
    if (r.data) {
      _setSid(r.data.id);
      setSname(r.data.name);
      setSid(r.data.id);
      return r.data.id;
    }
    return null;
  };

  var refreshSess = async function() {
    var r = await sb.from('auction_sessions').select('*, lots(count)').order('created_at', { ascending: false });
    if (r.data) setSess(r.data);
  };

  var refreshOrders = async function(id) {
    var sessionId = id || sid;
    if (!sessionId) { setOrders([]); return; }
    var r = await sb.from('auction_orders').select('*').eq('session_id', sessionId).order('created_at');
    if (r.data) setOrders(r.data);
  };

  var subscribe = function(id) {
    if (!id) return;
    if (chanRef.current) chanRef.current.unsubscribe();
    chanRef.current = sb.channel('lots-' + id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'lots', filter: 'session_id=eq.' + id },
        function(p) {
          if (p.eventType === 'INSERT') setLots(function(ls){ return ls.some(function(l){ return l.id===p.new.id; }) ? ls : ls.concat([p.new]); });
          if (p.eventType === 'UPDATE') setLots(function(ls){ return ls.map(function(l){ return l.id===p.new.id ? p.new : l; }); });
          if (p.eventType === 'DELETE') setLots(function(ls){ return ls.filter(function(l){ return l.id!==p.old.id; }); });
        })
      .subscribe();
  };

  useEffect(() => {
    var init = async function() {
      // Load shared lookup tables
      var r1 = await sb.from('produce_db').select('name').order('name');
      if (r1.data) setPdb(r1.data.map(function(x){ return x.name; }));

      var ru = await sb.from('units_db').select('name').order('name');
      if (ru.data && ru.data.length > 0) setUnits(ru.data.map(function(x){ return x.name; }));

      var rr = await sb.from('rows_db').select('name').order('id');
      if (rr.data && rr.data.length > 0) setRows(rr.data.map(function(x){ return x.name; }));

      var rbp = await sb.from('products').select('name').order('name');
      if (rbp.data) setBookProds(rbp.data.map(function(x){ return x.name; }));

      // Try to resume last session from localStorage
      var id = getSid();
      if (id) {
        var r2 = await sb.from('auction_sessions').select('*').eq('id', id).single();
        if (r2.data) {
          _setSid(id);
          setSname(r2.data.name);
          var r3 = await sb.from('lots').select('*').eq('session_id', id).order('created_at');
          if (r3.data) setLots(r3.data);
          subscribe(id);
          await refreshOrders(id);
        }
        // If session no longer exists, id stays null → picker will show
      }
      // If no id at all → picker will show

      await refreshSess();
      setReady(true);
      document.getElementById('loading').style.display = 'none';
    };
    init();
    return function() { if (chanRef.current) chanRef.current.unsubscribe(); };
  }, []);

  var commitName = async function(name) {
    setEN(false); setSname(name);
    if (sid) {
      await sb.from('auction_sessions').update({ name: name }).eq('id', sid);
      setSess(function(ss){ return ss.map(function(s){ return s.id===sid ? Object.assign({}, s, {name:name}) : s; }); });
    }
  };

  var onItem = function(v) {
    setForm(function(f){ return Object.assign({}, f, {item:v}); });
    setSugg(v.length ? pdb.filter(function(p){ return p.toLowerCase().includes(v.toLowerCase()); }).slice(0,8) : []);
  };
  var pickSugg = function(s) { setForm(function(f){ return Object.assign({}, f, {item:s}); }); setSugg([]); };

  var onUnitInput = function(v) {
    setForm(function(f){ return Object.assign({}, f, {unit:v}); });
    setUSugg(v.length ? units.filter(function(u){ return u.toLowerCase().includes(v.toLowerCase()); }).slice(0,8) : []);
  };
  var pickUnitSugg = function(s) { setForm(function(f){ return Object.assign({}, f, {unit:s}); }); setUSugg([]); };

  var onPrice = function(v) {
    var p=parseFloat(v), q=parseFloat(form.qty);
    setForm(function(f){ return Object.assign({}, f, {price:v, total:(!isNaN(p)&&!isNaN(q))?(p*q).toFixed(2):f.total}); });
  };
  var onQty = function(v) {
    var p=parseFloat(form.price), q=parseFloat(v);
    setForm(function(f){ return Object.assign({}, f, {qty:v, total:(!isNaN(p)&&!isNaN(q))?(p*q).toFixed(2):f.total}); });
  };
  var onTotal = function(v) {
    var q=parseFloat(form.qty), t=parseFloat(v);
    setForm(function(f){ return Object.assign({}, f, {total:v, price:(!isNaN(q)&&q>0&&!isNaN(t))?(t/q).toFixed(2):f.price}); });
  };

  var saveLot = async function() {
    if (!form.item.trim()) { if(itemRef.current) itemRef.current.focus(); return; }
    var unit = form.unit.trim() || 'each';
    // Auto-save new produce item
    if (!pdb.some(function(p){ return p.toLowerCase()===form.item.trim().toLowerCase(); })) {
      var nm = form.item.trim();
      await sb.from('produce_db').insert({ name: nm });
      setPdb(function(d){ return d.concat([nm]).sort(function(a,b){ return a.localeCompare(b); }); });
    }
    // Auto-save new unit type
    if (unit && !units.some(function(u){ return u.toLowerCase()===unit.toLowerCase(); })) {
      await sb.from('units_db').insert({ name: unit });
      setUnits(function(d){ return d.concat([unit]).sort(function(a,b){ return a.localeCompare(b); }); });
    }
    var payload = {
      session_id: sid, item: form.item.trim(), unit: unit,
      grade: form.grade, size: form.size, color: form.color, grower: form.grower.trim(),
      row_no: form.row_no, qty: form.qty, price: form.price, total: form.total||'0',
      description: form.description.trim(), is_loaded: false, is_bin_lot: form.is_bin_lot,
      photo_url: photoUrl || null
    };
    if (editId) {
      var r1 = await sb.from('lots').update(payload).eq('id', editId).select().single();
      if (r1.error) { console.error('Lot update error:', r1.error, 'payload:', payload); notify('Save failed: ' + (r1.error.message || r1.error.code || 'unknown'), true); return; }
      setLots(function(ls){ return ls.map(function(l){ return l.id===editId ? r1.data : l; }); });
      setEid(null); notify('Lot updated');
    } else {
      var r2 = await sb.from('lots').insert(payload).select().single();
      if (r2.error) { console.error('Lot insert error:', r2.error, 'payload:', payload); notify('Save failed: ' + (r2.error.message || r2.error.code || 'unknown'), true); return; }
      setLots(function(ls){ return ls.some(function(l){ return l.id===r2.data.id; }) ? ls : ls.concat([r2.data]); });
      notify('Saved \u2713');
    }
    setForm(function(f){ return Object.assign({}, BLANK, {unit:f.unit||'each', grade:f.grade, size:f.size, color:f.color, grower:f.grower, row_no:f.row_no}); });
    setCU(''); setSugg([]); setUSugg([]); clearPhoto();
    setTimeout(function(){ if(itemRef.current) itemRef.current.focus(); }, 80);
  };

  var startEdit = function(lot) {
    setForm({ item:lot.item, unit:lot.unit||'each', grade:lot.grade, size:lot.size||'N/A',
      color:lot.color||'N/A', grower:lot.grower||'', row_no:lot.row_no||'',
      qty:lot.qty||'', price:lot.price||'', total:lot.total||'',
      description:lot.description||'', is_loaded:false, is_bin_lot:lot.is_bin_lot||false });
    clearPhoto();
    if (lot.photo_url) { setPhoPrev(lot.photo_url); setPhoUrl(lot.photo_url); }
    setEid(lot.id); setTab('add'); setFO(true);
    setTimeout(function(){ if(itemRef.current) itemRef.current.focus(); }, 80);
  };

  var doDelLot = async function(id) {
    setLots(function(ls){ return ls.filter(function(l){ return l.id!==id; }); });
    setDelLot(null);
    await sb.from('lots').delete().eq('id', id);
  };

  var toggleLoaded = async function(id) {
    var lot = lots.find(function(l){ return l.id===id; });
    if (!lot) return;
    var val = !lot.is_loaded;
    setLots(function(ls){ return ls.map(function(l){ return l.id===id ? Object.assign({},l,{is_loaded:val}) : l; }); });
    await sb.from('lots').update({ is_loaded: val }).eq('id', id);
  };

  var startNewSession = async function() {
    if (chanRef.current) chanRef.current.unsubscribe();
    setLots([]); setForm({...BLANK}); setEid(null); setOrders([]);
    var id = await makeSession(null);
    subscribe(id); await refreshSess();
    setTab('add'); setFO(false);
  };

  var loadSession = async function(sess) {
    if (chanRef.current) chanRef.current.unsubscribe();
    _setSid(sess.id);
    setSname(sess.name);
    setSid(sess.id);
    var r = await sb.from('lots').select('*').eq('session_id', sess.id).order('created_at');
    if (r.data) setLots(r.data);
    subscribe(sess.id); refreshOrders(sess.id); setTab('add'); setFO(false);
  };

  var doDelSess = async function(id) {
    await sb.from('auction_sessions').delete().eq('id', id);
    setSess(function(ss){ return ss.filter(function(s){ return s.id!==id; }); });
    setDelSess(null);
    if (id === sid) startNewSession();
  };

  var addProd = async function() {
    var v = newProd.trim();
    if (!v || pdb.some(function(p){ return p.toLowerCase()===v.toLowerCase(); })) { setNP(''); return; }
    await sb.from('produce_db').insert({ name: v });
    setPdb(function(d){ return d.concat([v]).sort(function(a,b){ return a.localeCompare(b); }); });
    setNP(''); notify('Added!');
  };

  var delProd = async function(item) {
    await sb.from('produce_db').delete().eq('name', item);
    setPdb(function(d){ return d.filter(function(p){ return p!==item; }); });
  };

  var addUnit = async function() {
    var v = newUnit.trim();
    if (!v || units.some(function(u){ return u.toLowerCase()===v.toLowerCase(); })) { setNU(''); return; }
    await sb.from('units_db').insert({ name: v });
    setUnits(function(d){ return d.concat([v]).sort(function(a,b){ return a.localeCompare(b); }); });
    setNU(''); notify('Unit added!');
  };

  var delUnit = async function(item) {
    await sb.from('units_db').delete().eq('name', item);
    setUnits(function(d){ return d.filter(function(u){ return u!==item; }); });
    // If current form uses deleted unit, reset to first available
    setForm(function(f){ return f.unit === item ? Object.assign({},f,{unit: units.filter(function(u){ return u!==item; })[0]||''}) : f; });
  };

  var addRow = async function() {
    var v = newRow.trim();
    if (!v || rows.some(function(r){ return r.toLowerCase()===v.toLowerCase(); })) { setNR(''); return; }
    await sb.from('rows_db').insert({ name: v });
    setRows(function(d){ return d.concat([v]); });
    setNR(''); notify('Row added!');
  };

  var delRow = async function(item) {
    await sb.from('rows_db').delete().eq('name', item);
    setRows(function(d){ return d.filter(function(r){ return r!==item; }); });
    setForm(function(f){ return f.row_no === item ? Object.assign({},f,{row_no:''}) : f; });
  };

  // ── Buy List (order sheet) ──
  var boSuggList = function(v) {
    if (!v) return [];
    var seen = {}, out = [];
    var all = pdb.concat(bookProds);
    for (var i=0;i<all.length;i++){
      var nm = all[i]; if(!nm) continue;
      var k = nm.toLowerCase();
      if (k.indexOf(v.toLowerCase())>=0 && !seen[k]) { seen[k]=1; out.push(nm); if(out.length>=8) break; }
    }
    return out;
  };
  var onBoItem = function(v){ setBoItem(v); setBoSugg(boSuggList(v)); };
  var addOrder = async function() {
    var nm = boItem.trim(); if (!nm) return;
    if (!sid) { notify('Pick or start a session first', true); return; }
    var payload = { session_id: sid, item: nm, unit: (boUnit.trim()||'each'), target_qty: parseFloat(boQty)||0 };
    var r = await sb.from('auction_orders').insert(payload).select().single();
    if (r.error) { notify('Could not add', true); return; }
    setOrders(function(os){ return os.concat([r.data]); });
    setBoItem(''); setBoQty(''); setBoSugg([]); notify('Added to list \u2713');
  };
  var doDelOrder = async function(id) {
    setOrders(function(os){ return os.filter(function(o){ return o.id!==id; }); });
    setDelOrder(null);
    await sb.from('auction_orders').delete().eq('id', id);
  };
  var toggleOrderDone = async function(o) {
    var val = !o.done;
    setOrders(function(os){ return os.map(function(x){ return x.id===o.id ? Object.assign({},x,{done:val}) : x; }); });
    await sb.from('auction_orders').update({ done: val }).eq('id', o.id);
  };
  var purchasedFor = function(orderId) {
    return lots.reduce(function(s,l){ return s + (l.order_id===orderId ? (parseFloat(l.qty)||0) : 0); }, 0);
  };
  var logLot = async function(o) {
    var q = parseFloat(logQty);
    if (isNaN(q) || q<=0) { return; }
    var price = (logPrice||'').toString().trim();
    var pnum = parseFloat(price);
    var total = (!isNaN(pnum) && !isNaN(q)) ? (pnum*q).toFixed(2) : '0';
    var payload = {
      session_id: sid, item: o.item, unit: o.unit||'each',
      grade:'No. 1', size:'N/A', color:'N/A', grower:'', row_no:'',
      qty: String(logQty), price: price, total: total,
      description:'', is_loaded:false, is_bin_lot:false, photo_url:null, order_id: o.id
    };
    var r = await sb.from('lots').insert(payload).select().single();
    if (r.error) { notify('Log failed', true); return; }
    setLots(function(ls){ return ls.some(function(l){ return l.id===r.data.id; }) ? ls : ls.concat([r.data]); });
    var tgt = parseFloat(o.target_qty)||0;
    var newTotal = purchasedFor(o.id) + q;
    if (tgt>0 && newTotal>=tgt && !o.done) {
      setOrders(function(os){ return os.map(function(x){ return x.id===o.id ? Object.assign({},x,{done:true}) : x; }); });
      sb.from('auction_orders').update({ done:true }).eq('id', o.id);
    }
    setLogFor(null); setLogQty(''); setLogPrice(''); notify('Logged \u2713');
  };
  var orderDoneCount = orders.filter(function(o){ var t=parseFloat(o.target_qty)||0; return t>0 && purchasedFor(o.id)>=t; }).length;

  var runTotal    = lots.reduce(function(s,l){ return s + (parseFloat(l.total)||0); }, 0);
  var loadedCount = lots.filter(function(l){ return l.is_loaded; }).length;

  var reportItems = useMemo(function() {
    var map = {};
    lots.forEach(function(lot) {
      var key = lot.item.trim().toLowerCase();
      if (!map[key]) map[key] = { name:lot.item.trim(), cost:0, count:0, units:{} };
      map[key].cost  += parseFloat(lot.total)||0;
      map[key].count += 1;
      var u = lot.unit || 'unit';
      if (!map[key].units[u]) map[key].units[u] = { qty:0, cost:0, lots:0 };
      map[key].units[u].qty  += parseFloat(lot.qty)||0;
      map[key].units[u].cost += parseFloat(lot.total)||0;
      map[key].units[u].lots += 1;
    });
    return Object.values(map).sort(function(a,b){ return b.cost - a.cost; });
  }, [lots]);

  var reportUnits = useMemo(function() {
    var map = {};
    lots.forEach(function(lot) {
      var u = lot.unit || 'unit';
      if (!map[u]) map[u] = { unit:u, totalQty:0, totalCost:0, lotCount:0, binCount:0, items:{} };
      map[u].totalQty  += parseFloat(lot.qty)||0;
      map[u].totalCost += parseFloat(lot.total)||0;
      map[u].lotCount  += 1;
      if (lot.is_bin_lot) map[u].binCount += 1;
      var item = lot.item.trim();
      if (!map[u].items[item]) map[u].items[item] = { qty:0, lots:0 };
      map[u].items[item].qty  += parseFloat(lot.qty)||0;
      map[u].items[item].lots += 1;
    });
    return Object.values(map).sort(function(a,b){ return b.lotCount - a.lotCount; });
  }, [lots]);

  var binCount = lots.filter(function(l){ return l.is_bin_lot; }).length;

  var exportText = [
    sname, dateStr(), '='.repeat(44),
    ...lots.map(function(l,i) {
      return String(i+1).padStart(2,'0') + '  ' + l.item + '\n' +
        '    Grade: ' + l.grade +
        (l.size && l.size!=='N/A' ? '  |  Size: '+l.size : '') +
        (l.color && l.color!=='N/A' ? '  |  Color: '+l.color : '') +
        (l.is_bin_lot ? '  |  BIN LOT' : '') +
        '  |  Grower: ' + (l.grower||'\u2014') +
        (l.row_no ? '  |  '+l.row_no : '') +
        '  |  Qty: ' + (l.qty||'\u2014') +
        (l.price ? '  |  ' + fmt(l.price) + ' ea' : '') + '\n' +
        '    Lot total: ' + fmt(l.total) +
        (l.description ? '\n    Notes: ' + l.description : '');
    }),
    '='.repeat(44),
    'TOTAL: ' + fmt(runTotal) + '  (' + lots.length + ' lot' + (lots.length!==1?'s':'') + ')'
  ].join('\n\n');

  var copyExport = function() {
    if (navigator.clipboard) navigator.clipboard.writeText(exportText).then(function(){ notify('Copied!'); });
  };

  var openPrintReport = function() {
    var GS_PRINT = {
      'No. 1':   { bg:'#E1F5EE', color:'#085041', border:'#5DCAA5' },
      'No. 2':   { bg:'#E6F1FB', color:'#0C447C', border:'#85B7EB' },
      'No. 3':   { bg:'#EEEDFE', color:'#26215C', border:'#AFA9EC' },
      'Canners': { bg:'#FAEEDA', color:'#633806', border:'#EF9F27' },
    };
    var rowsHtml = lots.map(function(lot, i) {
      var gs = GS_PRINT[lot.grade] || GS_PRINT['No. 1'];
      var badges = [
        '<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:'+gs.bg+';color:'+gs.color+';border:1px solid '+gs.border+';">'+lot.grade+'</span>',
        (lot.size && lot.size!=='N/A') ? '<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:#E1F5EE;color:#085041;">'+lot.size+'</span>' : '',
        (lot.color && lot.color!=='N/A') ? '<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:#f5f5f3;color:#444;">'+lot.color+'</span>' : '',
        lot.is_bin_lot ? '<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:#FAEEDA;color:#633806;">Bin Lot</span>' : '',
      ].filter(Boolean).join(' ');
      var meta = [
        lot.grower ? 'GR '+lot.grower : '',
        lot.row_no || '',
        lot.qty ? 'Qty ' + lot.qty : '',
        lot.price ? fmt(lot.price)+' ea' : '',
      ].filter(Boolean).join(' · ');
      var thumb = lot.photo_url
        ? '<img src="'+lot.photo_url+'" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:0.5px solid #ddd;display:block;flex-shrink:0;" crossorigin="anonymous">'
        : '<div style="width:60px;height:60px;border-radius:6px;border:0.5px solid #eee;background:#f5f5f3;flex-shrink:0;"></div>';
      return '<div style="display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid #eee;">'
        + '<div style="font-size:11px;font-weight:700;color:#999;min-width:22px;padding-top:3px;flex-shrink:0;">'+(i+1)+'</div>'
        + thumb
        + '<div style="flex:1;min-width:0;">'
        + '<div style="font-size:16px;font-weight:600;color:#1a1a18;margin-bottom:4px;">'+lot.item+'</div>'
        + '<div style="margin-bottom:3px;">'+badges+'</div>'
        + '<div style="font-size:12px;color:#666;">'+meta+'</div>'
        + (lot.description ? '<div style="font-size:11px;color:#999;font-style:italic;margin-top:3px;">'+lot.description+'</div>' : '')
        + '</div>'
        + '<div style="font-size:15px;font-weight:600;color:#1D9E75;flex-shrink:0;padding-top:2px;">'+fmt(lot.total)+'</div>'
        + '</div>';
    }).join('');
    var html = '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
      + '<meta name="viewport" content="width=device-width,initial-scale=1">'
      + '<title>'+sname+'</title>'
      + '<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}'
      + 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#1a1a18;padding:32px 40px;max-width:760px;margin:0 auto}'
      + '@media print{body{padding:16px 20px}@page{margin:0.5in}}'
      + '</style></head><body>'
      + '<div style="border-bottom:2.5px solid #1D9E75;padding-bottom:16px;margin-bottom:22px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">'
      + '<div><div style="font-size:24px;font-weight:700;color:#1a1a18;">'+sname+'</div>'
      + '<div style="font-size:13px;color:#888;margin-top:4px;">'+dateStr()+' &nbsp;&middot;&nbsp; '+lots.length+' lot'+(lots.length!==1?'s':'')+'</div></div>'
      + '<div style="text-align:right;flex-shrink:0;">'
      + '<div style="font-size:22px;font-weight:700;color:#1D9E75;">'+fmt(runTotal)+'</div>'
      + '<div style="font-size:11px;color:#999;margin-top:2px;">Total paid</div>'
      + '</div></div></div>'
      + rowsHtml
      + '<div style="margin-top:20px;padding:12px 0;border-top:2px solid #1D9E75;display:flex;justify-content:space-between;align-items:center;">'
      + '<span style="font-size:14px;color:#555;">'+lots.length+' lot'+(lots.length!==1?'s':'')+' purchased</span>'
      + '<span style="font-size:20px;font-weight:700;color:#1D9E75;">'+fmt(runTotal)+'</span>'
      + '</div>'
      + '<script>window.addEventListener("load",function(){setTimeout(function(){window.print();},400);});<\/script>'
      + '</body></html>';
    var w = window.open('', '_blank');
    if (w) { w.document.write(html); w.document.close(); }
  };

  // shared styles
  var S = {
    inp: { background:'var(--bg-s)', border:'0.5px solid var(--border)', borderRadius:'var(--r-md)',
           padding:'9px 11px', fontSize:14, color:'var(--text-p)', outline:'none', width:'100%' },
    lbl: { fontSize:11, color:'var(--text-t)', marginBottom:3, display:'block' },
    card: { background:'var(--bg-p)', borderRadius:'var(--r-lg)', border:'0.5px solid var(--border)',
            padding:'10px 14px', marginBottom:8 },
  };

  // ── Session picker (shown when no session is active) ──
  if (ready && !sid) {
    return (
      <div style={{padding:'32px 20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:28,marginBottom:6}}>🥬</div>
          <div style={{fontSize:20,fontWeight:600,color:'var(--text-p)',marginBottom:4}}>Produce Auction Tracker</div>
          <div style={{fontSize:13,color:'var(--text-t)'}}>Choose a session or start a new one</div>
        </div>

        <button onClick={async function(){
            var id = await makeSession(null);
            subscribe(id); await refreshSess(); setTab('add'); setFO(false);
          }}
          style={{width:'100%',padding:'14px',fontSize:15,fontWeight:600,
            borderRadius:'var(--r-lg)',border:'none',background:'var(--green)',
            color:'#fff',cursor:'pointer',marginBottom:24}}>
          + Start New Auction
        </button>

        {sessions.length > 0 && (
          <div>
            <div style={{fontSize:11,fontWeight:500,letterSpacing:'0.06em',
              color:'var(--text-t)',marginBottom:10}}>PREVIOUS SESSIONS</div>
            {sessions.map(function(sess, idx) {
              var lotCount = sess.lots?.[0]?.count ?? 0;
              var isNewest = idx === 0;
              return (
                <div key={sess.id} style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                  border: isNewest ? '1.5px solid var(--green)' : '0.5px solid var(--border)',
                  padding:'12px 14px',marginBottom:8,
                  display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)',marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
                      {sess.name}
                      {isNewest && (
                        <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,
                          color:'#C0392B',background:'#FDECEA',border:'1px solid #F5B7B1',
                          borderRadius:20,padding:'2px 8px',letterSpacing:'0.03em'}}>
                          <span style={{width:7,height:7,borderRadius:'50%',background:'#E74C3C',
                            display:'inline-block',animation:'livepulse 1.4s ease-in-out infinite'}} />
                          LIVE
                        </span>
                      )}
                    </div>
                    <div style={{fontSize:12,color:'var(--text-t)'}}>
                      {new Date(sess.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                      {lotCount > 0 && <span style={{marginLeft:8}}>&middot; {lotCount} lot{lotCount!==1?'s':''}</span>}
                    </div>
                  </div>
                  <button onClick={function(){ loadSession(sess); }}
                    style={{padding:'8px 18px',fontSize:13,fontWeight:500,
                      borderRadius:'var(--r-md)',border:'none',
                      background:'var(--green)',color:'#fff',cursor:'pointer',flexShrink:0}}>
                    {isNewest ? 'Join →' : 'Open'}
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{paddingBottom:76}}>

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',
          background:toastErr?'#A32D2D':'var(--green)',color:'#fff',padding:'8px 22px',
          borderRadius:24,fontSize:14,fontWeight:500,zIndex:1000,pointerEvents:'none',
          whiteSpace:'nowrap',maxWidth:'90vw',textAlign:'center'}}>
          {toast}
        </div>
      )}

      {/* Print header */}
      <div className="po" style={{padding:'0 0 12px',borderBottom:'1px solid #ccc',marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:600}}>{sname}</div>
        <div style={{fontSize:13,color:'#666',marginTop:4}}>{dateStr()} &middot; {lots.length} lots &middot; {fmt(runTotal)}</div>
      </div>

      {/* Sticky header */}
      <div className="np" style={{position:'sticky',top:0,zIndex:50,background:'var(--bg-p)',
        borderBottom:'0.5px solid var(--border)',padding:'10px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
          {editName ? (
            <input ref={nameRef} value={sname} onChange={function(e){ setSname(e.target.value); }}
              onBlur={function(e){ commitName(e.target.value); }}
              onKeyDown={function(e){ if(e.key==='Enter') commitName(sname); }}
              style={Object.assign({},S.inp,{fontSize:15,fontWeight:500,padding:'3px 6px',width:'auto',flex:1,marginRight:8})}
              autoFocus />
          ) : (
            <span onClick={function(){ setEN(true); setTimeout(function(){ if(nameRef.current) nameRef.current.select(); },50); }}
              style={{fontSize:15,fontWeight:500,color:'var(--text-p)',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
              {sname}<span style={{fontSize:11,color:'var(--text-t)'}}>&#x270E;</span>
            </span>
          )}
          <span style={{fontSize:20,fontWeight:500,color:'var(--green)'}}>{fmt(runTotal)}</span>
        </div>
        <span style={{fontSize:12,color:'var(--text-s)'}}>
          {lots.length} lot{lots.length!==1?'s':''}
          {loadedCount > 0 && <span style={{color:'var(--green)',marginLeft:4}}>&middot; {loadedCount} loaded</span>}
          &nbsp;&middot;&nbsp;{dateStr()}
          <span style={{fontSize:10,color:'var(--green)',marginLeft:8}}>&#x25cf; auto-saved</span>
        </span>
      </div>

      {/* ── TAB: ADD LOT ── */}
      {tab === 'add' && (
        <div style={{padding:'12px 16px'}}>

          {/* Form card */}
          <div className="np" style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
            border:'0.5px solid var(--border)',marginBottom:14,overflow:'hidden'}}>

            {/* Toggle header */}
            <div onClick={function(){ setFO(function(o){ return !o; }); }}
              style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'12px 14px',cursor:'pointer',userSelect:'none',WebkitUserSelect:'none'}}>
              <span style={{fontSize:11,fontWeight:500,letterSpacing:'0.06em',color:'var(--text-s)'}}>
                {editId ? '\u270E  EDIT LOT' : 'NEW LOT'}
              </span>
              <span style={{fontSize:12,color:'var(--text-t)'}}>
                {formOpen ? '\u25b2 hide' : '\u25bc show'}
              </span>
            </div>

            {/* Collapsible body */}
            {formOpen && (
              <div style={{padding:'0 14px 14px'}}>

                {/* Produce item */}
                <div style={{marginBottom:10,position:'relative'}}>
                  <label style={S.lbl}>PRODUCE ITEM</label>
                  <input ref={itemRef} value={form.item} onChange={function(e){ onItem(e.target.value); }}
                    onKeyDown={function(e){ if(e.key==='Enter') saveLot(); }}
                    placeholder="Start typing to search..."
                    style={S.inp} autoComplete="off" />
                  {sugg.length > 0 && (
                    <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,
                      background:'var(--bg-p)',border:'0.5px solid var(--border-md)',
                      borderRadius:'var(--r-md)',zIndex:100,overflow:'hidden',
                      boxShadow:'0 4px 16px rgba(0,0,0,.1)'}}>
                      {sugg.map(function(s) {
                        return (
                          <div key={s}
                            onMouseDown={function(){ pickSugg(s); }}
                            onTouchStart={function(e){ e.preventDefault(); pickSugg(s); }}
                            style={{padding:'11px 14px',fontSize:14,cursor:'pointer',
                              borderBottom:'0.5px solid var(--border)',color:'var(--text-p)'}}>
                            {s}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                {/* Grower # */}
                <div style={{marginBottom:10}}>
                  <label style={S.lbl}>GROWER #</label>
                  <input value={form.grower} onChange={function(e){ setForm(function(f){ return Object.assign({},f,{grower:e.target.value}); }); }}
                    placeholder="e.g. 4471" style={S.inp} />
                </div>

                {/* Unit */}
                <div style={{marginBottom:10,position:'relative'}}>
                  <label style={S.lbl}>UNIT</label>
                  <input ref={unitRef} value={form.unit} onChange={function(e){ onUnitInput(e.target.value); }}
                    onFocus={function(){ setUSugg(units.slice(0,8)); }}
                    onBlur={function(){ setTimeout(function(){ setUSugg([]); }, 150); }}
                    placeholder="e.g. 25 lb. box, bunch, each" style={S.inp} autoComplete="off" />
                  {unitSugg.length > 0 && (
                    <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,
                      background:'var(--bg-p)',border:'0.5px solid var(--border-md)',
                      borderRadius:'var(--r-md)',zIndex:100,overflow:'hidden',
                      boxShadow:'0 4px 16px rgba(0,0,0,.1)'}}>
                      {unitSugg.map(function(s) {
                        return (
                          <div key={s}
                            onMouseDown={function(){ pickUnitSugg(s); }}
                            onTouchStart={function(e){ e.preventDefault(); pickUnitSugg(s); }}
                            style={{padding:'11px 14px',fontSize:14,cursor:'pointer',
                              borderBottom:'0.5px solid var(--border)',color:'var(--text-p)'}}>
                            {s}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                {/* Qty + Price */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <label style={S.lbl}>QTY</label>
                    <input value={form.qty} onChange={function(e){ onQty(e.target.value); }}
                      type="number" inputMode="decimal" placeholder="0" style={S.inp} />
                  </div>
                  <div>
                    <label style={S.lbl}>PRICE / UNIT $</label>
                    <input value={form.price} onChange={function(e){ onPrice(e.target.value); }}
                      type="number" inputMode="decimal" placeholder="0.00" style={S.inp} />
                  </div>
                </div>

                {/* Total */}
                <div style={{marginBottom:10}}>
                  <label style={S.lbl}>TOTAL LOT COST $</label>
                  <input value={form.total} onChange={function(e){ onTotal(e.target.value); }}
                    type="number" inputMode="decimal" placeholder="or enter lot total directly"
                    style={Object.assign({},S.inp,{background:'var(--green-l)',border:'0.5px solid var(--green-b)',
                      color:'var(--green-d)',fontSize:17,fontWeight:500})} />
                </div>

                {/* Notes */}
                <div style={{marginBottom:12}}>
                  <label style={S.lbl}>NOTES (optional)</label>
                  <textarea value={form.description}
                    onChange={function(e){ setForm(function(f){ return Object.assign({},f,{description:e.target.value}); }); }}
                    placeholder="e.g. slight bruising, early pick, good size..."
                    rows={2}
                    style={Object.assign({},S.inp,{resize:'vertical',lineHeight:1.5,padding:'8px 11px',fontSize:13})}>
                  </textarea>
                </div>

                {/* Buttons */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:8}}>
                  <button
                    onClick={function(){ setForm(function(f){ return Object.assign({},BLANK,{unit:f.unit,grade:f.grade,color:f.color,grower:f.grower}); }); setEid(null); setSugg([]); setUSugg([]); clearPhoto(); }}
                    style={{padding:11,fontSize:14,borderRadius:'var(--r-md)',border:'0.5px solid var(--border-md)',
                      background:'var(--bg-s)',color:'var(--text-s)',cursor:'pointer'}}>
                    Clear
                  </button>
                  <button onClick={saveLot}
                    style={{padding:11,fontSize:15,fontWeight:500,borderRadius:'var(--r-md)',
                      border:'none',background:'var(--green)',color:'#fff',cursor:'pointer'}}>
                    {editId ? 'Update Lot' : 'Save + Next'}
                  </button>
                </div>

              </div>
            )}
          </div>

          {/* Lot list */}
          {lots.length > 0 ? (
            <div>
              <div className="np" style={{fontSize:11,fontWeight:500,letterSpacing:'0.06em',
                color:'var(--text-s)',marginBottom:8}}>
                SAVED LOTS ({lots.length})
              </div>

              {lots.slice().map(function(lot) {
                var gs  = GS[lot.grade] || GS['No. 1'];
                var dot = CDOT[lot.color];
                return (
                  <div key={lot.id} className="lc"
                    style={{background: lot.is_loaded ? 'var(--green-l)' : 'var(--bg-p)',
                      borderRadius:'var(--r-lg)',
                      border: lot.is_loaded ? '0.5px solid var(--green-b)' : '0.5px solid var(--border)',
                      padding:'10px 14px',marginBottom:8}}>

                    {/* Card top row */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {dot && <span style={{width:10,height:10,borderRadius:'50%',background:dot,flexShrink:0}} />}
                        <span style={{fontSize:15,fontWeight:500,
                          color: lot.is_loaded ? 'var(--green-d)' : 'var(--text-p)',
                          textDecoration: lot.is_loaded ? 'line-through' : 'none',
                          opacity: lot.is_loaded ? 0.75 : 1}}>
                          {lot.item}
                        </span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,
                          background:gs.bg,color:gs.fg,fontWeight:500,flexShrink:0}}>
                          {lot.grade}
                        </span>
                        {lot.size && lot.size !== 'N/A' && (
                          <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,
                            background:'var(--green-l)',color:'var(--green-d)',fontWeight:500,flexShrink:0}}>
                            {lot.size}
                          </span>
                        )}
                        {lot.is_bin_lot && (
                          <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,
                            background:'#FAEEDA',color:'#633806',fontWeight:500,flexShrink:0}}>
                            Bin
                          </span>
                        )}
                        <button onClick={function(){ toggleLoaded(lot.id); }}
                          title={lot.is_loaded ? 'Mark unloaded' : 'Mark loaded'}
                          style={{width:30,height:30,borderRadius:'50%',flexShrink:0,cursor:'pointer',
                            border: lot.is_loaded ? 'none' : '1.5px solid var(--border-md)',
                            background: lot.is_loaded ? 'var(--green)' : 'transparent',
                            color: lot.is_loaded ? '#fff' : 'var(--text-t)',
                            fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600}}>
                          {lot.is_loaded ? '\u2713' : '\u25cb'}
                        </button>
                      </div>
                    </div>

                    {/* Photo thumbnail */}
                    {lot.photo_url && (
                      <div style={{marginBottom:8}}>
                        <img src={lot.photo_url} alt={lot.item}
                          style={{width:80,height:80,objectFit:'cover',borderRadius:'var(--r-md)',
                            border:'0.5px solid var(--border)',display:'block'}} />
                      </div>
                    )}

                    {/* Qty row */}
                    <div style={{fontSize:12,color:'var(--text-s)',marginBottom: lot.description ? 4 : 6}}>
                      Qty <b style={{color:'var(--text-p)',fontWeight:500}}>{lot.qty||'\u2014'}</b>
                      {lot.price ? <span style={{marginLeft:8}}>{fmt(lot.price)} ea</span> : null}
                    </div>

                    {/* Notes */}
                    {lot.description ? (
                      <div style={{fontSize:12,color:'var(--text-t)',fontStyle:'italic',marginBottom:6,lineHeight:1.4}}>
                        {lot.description}
                      </div>
                    ) : null}

                    {/* Footer: confirm delete or normal actions */}
                    {delLot === lot.id ? (
                      <div style={{paddingTop:8,borderTop:'0.5px solid var(--border)',
                        display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{fontSize:12,color:'var(--text-s)'}}>Remove this lot?</span>
                        <div style={{display:'flex',gap:8}}>
                          <button onClick={function(){ setDelLot(null); }}
                            style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',
                              border:'0.5px solid var(--border-md)',background:'var(--bg-s)',
                              color:'var(--text-s)',cursor:'pointer'}}>
                            Cancel
                          </button>
                          <button onClick={function(){ doDelLot(lot.id); }}
                            style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',
                              border:'none',background:'#A32D2D',color:'#fff',cursor:'pointer',fontWeight:500}}>
                            Yes, remove
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                        paddingTop:6,borderTop:'0.5px solid var(--border)'}}>
                        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                          {lot.grower ? (
                            <span style={{fontSize:11,background:'var(--bg-s)',color:'var(--text-s)',
                              padding:'2px 8px',borderRadius:20}}>
                              GR {lot.grower}
                            </span>
                          ) : null}
                          {lot.row_no ? (
                            <span style={{fontSize:11,background:'var(--bg-s)',color:'var(--text-s)',
                              padding:'2px 8px',borderRadius:20}}>
                              {lot.row_no}
                            </span>
                          ) : null}
                          <button className="np" onClick={function(){ startEdit(lot); }}
                            style={{fontSize:12,color:'#185FA5',background:'none',border:'none',cursor:'pointer',padding:0}}>
                            Edit
                          </button>
                          <button className="np" onClick={function(){ setDelLot(lot.id); }}
                            style={{fontSize:12,color:'#A32D2D',background:'none',border:'none',cursor:'pointer',padding:0}}>
                            Remove
                          </button>
                        </div>
                        <span style={{fontSize:16,fontWeight:500,color:'var(--text-p)'}}>{fmt(lot.total)}</span>
                      </div>
                    )}
                  </div>
                );
              })}

              <div style={{background:'var(--bg-t)',borderRadius:'var(--r-md)',
                padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                <span style={{fontSize:14,color:'var(--text-s)'}}>Total ({lots.length} lots)</span>
                <span style={{fontSize:18,fontWeight:500,color:'var(--text-p)'}}>{fmt(runTotal)}</span>
              </div>
            </div>
          ) : (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
              No lots yet &mdash; fill out the form above
            </div>
          )}
        </div>
      )}

      {/* ── TAB: SESSIONS ── */}
      {tab === 'lists' && (
        <div style={{padding:'12px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:14,fontWeight:500,color:'var(--text-p)'}}>Auction Sessions</span>
            <button onClick={startNewSession}
              style={{fontSize:13,padding:'6px 14px',borderRadius:'var(--r-md)',
                border:'0.5px solid var(--green)',background:'transparent',color:'var(--green)',
                cursor:'pointer',fontWeight:500}}>
              + New Session
            </button>
          </div>

          {sessions.length === 0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>No sessions yet</div>
          ) : sessions.map(function(sess) {
            var isCur = sess.id === sid;
            return (
              <div key={sess.id}
                style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                  border: isCur ? '1.5px solid var(--green)' : '0.5px solid var(--border)',
                  padding:'12px 14px',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:2}}>
                  <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>
                    {sess.name}
                    {isCur && <span style={{fontSize:11,marginLeft:8,color:'var(--green)',fontWeight:400}}>&bull; live</span>}
                  </div>
                  {isCur && lots.length > 0 && (
                    <span style={{fontSize:13,fontWeight:500,color:'var(--green)',flexShrink:0,marginLeft:8}}>
                      {fmt(runTotal)}
                    </span>
                  )}
                </div>
                <div style={{fontSize:12,color:'var(--text-s)',marginBottom:10}}>
                  {new Date(sess.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  {isCur && lots.length > 0 && (
                    <span style={{marginLeft:8}}>{lots.length} lot{lots.length!==1?'s':''}</span>
                  )}
                </div>
                <div style={{display:'flex',gap:14,paddingTop:10,borderTop:'0.5px solid var(--border)',alignItems:'center',flexWrap:'wrap'}}>
                  {delSess === sess.id ? (
                    <>
                      <span style={{fontSize:12,color:'var(--text-s)'}}>Delete this session?</span>
                      <button onClick={function(){ setDelSess(null); }}
                        style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',
                          border:'0.5px solid var(--border-md)',background:'var(--bg-s)',
                          color:'var(--text-s)',cursor:'pointer',marginLeft:'auto'}}>
                        Cancel
                      </button>
                      <button onClick={function(){ doDelSess(sess.id); }}
                        style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',
                          border:'none',background:'#A32D2D',color:'#fff',cursor:'pointer',fontWeight:500}}>
                        Yes, delete
                      </button>
                    </>
                  ) : (
                    <>
                      {isCur && (
                        <button onClick={function(){ setTab('add'); }}
                          style={{fontSize:13,fontWeight:500,padding:'6px 14px',borderRadius:'var(--r-md)',
                            border:'none',background:'var(--green)',color:'#fff',cursor:'pointer'}}>
                          + Add Lots
                        </button>
                      )}
                      {!isCur && (
                        <button onClick={function(){ loadSession(sess); }}
                          style={{fontSize:13,color:'#185FA5',background:'none',border:'none',cursor:'pointer',padding:0}}>
                          Load
                        </button>
                      )}
                      <button onClick={function(){ setDelSess(sess.id); }}
                        style={{fontSize:13,color:'#A32D2D',background:'none',border:'none',cursor:'pointer',padding:0}}>
                        Delete
                      </button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TAB: REPORTS ── */}
      {tab === 'reports' && (
        <div style={{padding:'12px 16px'}}>
