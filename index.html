            <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)'}}>Purchase Report</div>
            <button onClick={function(){ setTab('add'); }}
              style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',
                border:'none',background:'var(--green)',color:'#fff',cursor:'pointer',fontWeight:500}}>
              + Add Lots
            </button>
          </div>
          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>
            {sname} &middot; {lots.length} lots &middot; {fmt(runTotal)}
          </div>

          {lots.length === 0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
              Add some lots to see the report
            </div>
          ) : (
            <div>

              {/* Summary stats — always visible */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:14}}>
                {[
                  {lbl:'Paid',    val:fmt(runTotal)},
                  {lbl:'Lots',    val:lots.length},
                  {lbl:'Products',val:reportItems.length},
                  {lbl:'Bins',    val:binCount},
                ].map(function(s){
                  return (
                    <div key={s.lbl} style={{background:'var(--bg-t)',borderRadius:'var(--r-md)',
                      padding:'10px 6px',textAlign:'center'}}>
                      <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3,letterSpacing:'.04em'}}>
                        {s.lbl.toUpperCase()}
                      </div>
                      <div style={{fontSize:16,fontWeight:500,color: s.lbl==='Bins'&&binCount>0 ? '#633806' : 'var(--text-p)'}}>
                        {s.val}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* View toggle */}
              <div style={{display:'grid',gridTemplateColumns:'1fr',gap:0,
                border:'0.5px solid var(--border)',borderRadius:'var(--r-md)',overflow:'hidden',marginBottom:14}}>
                {[{id:'product',lbl:'By Product'}].map(function(v){
                  var on = reportView === v.id;
                  return (
                    <button key={v.id} onClick={function(){ setRV(v.id); }}
                      style={{padding:'9px 4px',fontSize:12,fontWeight: on?600:400,
                        border:'none',borderRight:'0.5px solid var(--border)',
                        background: on ? 'var(--green)' : 'var(--bg-s)',
                        color: on ? '#fff' : 'var(--text-s)',cursor:'pointer'}}>
                      {v.lbl}
                    </button>
                  );
                })}
              </div>

              {/* ── VIEW: BY PRODUCT ── */}
              {reportView === 'product' && reportItems.map(function(item) {
                return (
                  <div key={item.name} style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                    border:'0.5px solid var(--border)',marginBottom:8,overflow:'hidden'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                      padding:'10px 14px',borderBottom:'0.5px solid var(--border)'}}>
                      <span style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{item.name}</span>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{fmt(item.cost)}</div>
                        <div style={{fontSize:11,color:'var(--text-t)'}}>{item.count} lot{item.count!==1?'s':''}</div>
                      </div>
                    </div>
                    {Object.entries(item.units).map(function(entry) {
                      var unit = entry[0]; var data = entry[1];
                      var qd = Number.isInteger(data.qty) ? data.qty : parseFloat(data.qty.toFixed(1));
                      return (
                        <div key={unit} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                          padding:'8px 14px',borderBottom:'0.5px solid var(--border)'}}>
                          <div>
                            <span style={{fontSize:12,color:'var(--text-s)'}}>Qty </span>
                            <span style={{fontSize:13,fontWeight:500,color:'var(--text-p)'}}>{qd}</span>
                            {data.lots > 1 && <span style={{fontSize:11,color:'var(--text-t)',marginLeft:8}}>({data.lots} lots)</span>}
                            {data.qty > 0 && <span style={{fontSize:11,color:'var(--text-t)',marginLeft:8}}>{fmt(data.cost/data.qty)} ea</span>}
                          </div>
                          <span style={{fontSize:13,color:'var(--text-s)'}}>{fmt(data.cost)}</span>
                        </div>
                      );
                    })}
                    <div style={{padding:'6px 14px',background:'var(--bg-s)'}}>
                      <div style={{height:4,borderRadius:2,background:'var(--bg-t)',overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:2,background:'var(--green)',
                          width:(item.cost/runTotal*100).toFixed(1)+'%'}} />
                      </div>
                      <div style={{fontSize:10,color:'var(--text-t)',marginTop:3}}>
                        {(item.cost/runTotal*100).toFixed(1)}% of spend
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* ── VIEW: BY UNIT ── */}
              {reportView === 'unit' && reportUnits.map(function(row) {
                var qd = Number.isInteger(row.totalQty) ? row.totalQty : parseFloat(row.totalQty.toFixed(1));
                return (
                  <div key={row.unit} style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                    border:'0.5px solid var(--border)',marginBottom:8,overflow:'hidden'}}>
                    {/* Unit header */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                      padding:'10px 14px',borderBottom:'0.5px solid var(--border)'}}>
                      <div>
                        <span style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{row.unit}</span>
                        {row.binCount > 0 && (
                          <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,marginLeft:8,
                            background:'#FAEEDA',color:'#633806',fontWeight:500}}>
                            {row.binCount} bin{row.binCount!==1?'s':''}
                          </span>
                        )}
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>
                          {qd} total
                        </div>
                        <div style={{fontSize:11,color:'var(--text-t)'}}>
                          {row.lotCount} lot{row.lotCount!==1?'s':''} &middot; {fmt(row.totalCost)}
                        </div>
                      </div>
                    </div>
                    {/* Items using this unit */}
                    {Object.entries(row.items).map(function(entry) {
                      var itemName = entry[0]; var data = entry[1];
                      var iqd = Number.isInteger(data.qty) ? data.qty : parseFloat(data.qty.toFixed(1));
                      return (
                        <div key={itemName} style={{display:'flex',justifyContent:'space-between',
                          alignItems:'center',padding:'7px 14px',borderBottom:'0.5px solid var(--border)'}}>
                          <span style={{fontSize:13,color:'var(--text-p)'}}>{itemName}</span>
                          <div style={{textAlign:'right'}}>
                            <span style={{fontSize:13,fontWeight:500,color:'var(--text-p)'}}>{iqd}</span>
                            {data.lots > 1 && <span style={{fontSize:11,color:'var(--text-t)',marginLeft:6}}>({data.lots} lots)</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              {/* ── VIEW: BIN LOTS ── */}
              {reportView === 'bins' && (
                <div>
                  {binCount === 0 ? (
                    <div style={{textAlign:'center',padding:'30px 20px',color:'var(--text-t)',fontSize:14}}>
                      No bin lots in this session
                    </div>
                  ) : (
                    lots.filter(function(l){ return l.is_bin_lot; }).map(function(lot) {
                      var gs = GS[lot.grade] || GS['No. 1'];
                      return (
                        <div key={lot.id} style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                          border:'0.5px solid #EF9F27',padding:'10px 14px',marginBottom:8}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                            <span style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{lot.item}</span>
                            <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,
                              background:'#FAEEDA',color:'#633806',fontWeight:500}}>
                              Bin
                            </span>
                          </div>
                          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:6}}>
                            <span style={{fontWeight:500,color:'var(--text-p)'}}>{lot.qty||'\u2014'}</span> items
                            &nbsp;&middot;&nbsp;{lot.unit}
                            &nbsp;&middot;&nbsp;
                            <span style={{padding:'2px 8px',borderRadius:20,background:gs.bg,color:gs.fg,fontWeight:500}}>
                              {lot.grade}
                            </span>
                            {lot.size && lot.size!=='N/A' && <span style={{marginLeft:6,color:'var(--text-t)'}}>{lot.size}</span>}
                          </div>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                            paddingTop:6,borderTop:'0.5px solid var(--border)'}}>
                            <span style={{fontSize:12,color:'var(--text-t)'}}>
                              {lot.price ? fmt(lot.price)+'/item' : ''}
                              {lot.grower ? <span style={{marginLeft:8}}>GR {lot.grower}</span> : null}
                              {lot.row_no ? <span style={{marginLeft:8}}>{lot.row_no}</span> : null}
                            </span>
                            <span style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{fmt(lot.total)}</span>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              )}

            </div>
          )}
        </div>
      )}

      {/* ── TAB: PRINT/EXPORT ── */}
      {tab === 'export' && (
        <div style={{padding:'12px 16px'}}>
          <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:12}}>Print / Export</div>
          {lots.length === 0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
              Add some lots first
            </div>
          ) : (
            <div>
              <div style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',border:'0.5px solid var(--border)',
                padding:14,fontFamily:'monospace',fontSize:12,lineHeight:1.8,
                color:'var(--text-p)',whiteSpace:'pre-wrap',marginBottom:12,overflowX:'auto'}}>
                {exportText}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button onClick={copyExport}
                  style={{padding:11,fontSize:13,fontWeight:500,borderRadius:'var(--r-md)',
                    border:'0.5px solid var(--green)',background:'transparent',color:'var(--green)',cursor:'pointer'}}>
                  Copy text
                </button>
                <button onClick={openPrintReport}
                  style={{padding:11,fontSize:13,fontWeight:500,borderRadius:'var(--r-md)',
                    border:'none',background:'var(--green)',color:'#fff',cursor:'pointer'}}>
                  🖨 Print Report
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── TAB: ITEMS DB ── */}
      {tab === 'db' && (
        <div style={{padding:'12px 16px'}}>

          {/* Produce Items */}
          <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:4}}>Produce Items</div>
          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>
            {pdb.length} items &middot; Shared across sessions &middot; Auto-saves new items
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input value={newProd} onChange={function(e){ setNP(e.target.value); }}
              onKeyDown={function(e){ if(e.key==='Enter') addProd(); }}
              placeholder="Add item..."
              style={Object.assign({},S.inp,{flex:1,width:'auto'})} />
            <button onClick={addProd}
              style={{padding:'9px 16px',fontSize:14,fontWeight:500,borderRadius:'var(--r-md)',
                border:'none',background:'var(--green)',color:'#fff',cursor:'pointer',flexShrink:0}}>
              Add
            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:24}}>
            {pdb.map(function(item) {
              return (
                <div key={item} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  background:'var(--bg-p)',border:'0.5px solid var(--border)',
                  borderRadius:'var(--r-md)',padding:'7px 10px'}}>
                  <span style={{fontSize:13,color:'var(--text-p)'}}>{item}</span>
                  <button onClick={function(){ delProd(item); }}
                    style={{fontSize:18,lineHeight:1,color:'var(--text-t)',background:'none',
                      border:'none',cursor:'pointer',padding:'0 0 0 6px'}}>
                    &times;
                  </button>
                </div>
              );
            })}
          </div>

          {/* Divider */}
          <div style={{borderTop:'0.5px solid var(--border)',marginBottom:20}} />

          {/* Units */}
          <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:4}}>Unit Types</div>
          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>
            {units.length} units &middot; Shared &middot; Changes appear in the unit dropdown immediately
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input value={newUnit} onChange={function(e){ setNU(e.target.value); }}
              onKeyDown={function(e){ if(e.key==='Enter') addUnit(); }}
              placeholder="e.g. 30 lb. flat..."
              style={Object.assign({},S.inp,{flex:1,width:'auto'})} />
            <button onClick={addUnit}
              style={{padding:'9px 16px',fontSize:14,fontWeight:500,borderRadius:'var(--r-md)',
                border:'none',background:'var(--green)',color:'#fff',cursor:'pointer',flexShrink:0}}>
              Add
            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
            {units.map(function(item) {
              return (
                <div key={item} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  background:'var(--bg-p)',border:'0.5px solid var(--border)',
                  borderRadius:'var(--r-md)',padding:'7px 10px'}}>
                  <span style={{fontSize:13,color:'var(--text-p)'}}>{item}</span>
                  <button onClick={function(){ delUnit(item); }}
                    style={{fontSize:18,lineHeight:1,color:'var(--text-t)',background:'none',
                      border:'none',cursor:'pointer',padding:'0 0 0 6px'}}>
                    &times;
                  </button>
                </div>
              );
            })}
          </div>

          {/* Divider */}
          <div style={{borderTop:'0.5px solid var(--border)',marginBottom:20,marginTop:24}} />

          {/* Rows */}
          <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)',marginBottom:4}}>Auction Rows</div>
          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>
            {rows.length} rows &middot; Appears in the Row No. dropdown on each lot
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input value={newRow} onChange={function(e){ setNR(e.target.value); }}
              onKeyDown={function(e){ if(e.key==='Enter') addRow(); }}
              placeholder="e.g. Row 7..."
              style={Object.assign({},S.inp,{flex:1,width:'auto'})} />
            <button onClick={addRow}
              style={{padding:'9px 16px',fontSize:14,fontWeight:500,borderRadius:'var(--r-md)',
                border:'none',background:'var(--green)',color:'#fff',cursor:'pointer',flexShrink:0}}>
              Add
            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
            {rows.map(function(item) {
              return (
                <div key={item} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  background:'var(--bg-p)',border:'0.5px solid var(--border)',
                  borderRadius:'var(--r-md)',padding:'7px 10px'}}>
                  <span style={{fontSize:13,color:'var(--text-p)'}}>{item}</span>
                  <button onClick={function(){ delRow(item); }}
                    style={{fontSize:18,lineHeight:1,color:'var(--text-t)',background:'none',
                      border:'none',cursor:'pointer',padding:'0 0 0 6px'}}>
                    &times;
                  </button>
                </div>
              );
            })}
          </div>

        </div>
      )}

      {/* ── TAB: BUY LIST ── */}
      {tab === 'buy' && (
        <div style={{padding:'12px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <div style={{fontSize:14,fontWeight:500,color:'var(--text-p)'}}>Buy List</div>
            <span style={{fontSize:12,color:'var(--text-s)'}}>{orderDoneCount}/{orders.length} met</span>
          </div>
          <div style={{fontSize:12,color:'var(--text-s)',marginBottom:12}}>{sname}</div>

          <div style={{background:'var(--bg-p)',border:'0.5px solid var(--border)',borderRadius:'var(--r-lg)',padding:'10px 12px',marginBottom:14}}>
            <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
              <div style={{flex:'1 1 130px',minWidth:0,position:'relative'}}>
                <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>Item</div>
                <input value={boItem} onChange={function(e){ onBoItem(e.target.value); }} placeholder="e.g. Green Beans"
                  style={{width:'100%',boxSizing:'border-box',padding:'8px 9px',fontSize:14,border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',background:'var(--bg-s)',color:'var(--text-p)'}} />
                {boSugg.length>0 && (
                  <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:20,background:'var(--bg-p)',border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',marginTop:2,boxShadow:'0 6px 18px rgba(0,0,0,0.12)',overflow:'hidden'}}>
                    {boSugg.map(function(s){
                      return <div key={s} onClick={function(){ setBoItem(s); setBoSugg([]); }}
                        style={{padding:'8px 10px',fontSize:13,color:'var(--text-p)',cursor:'pointer',borderBottom:'0.5px solid var(--border)'}}>{s}</div>;
                    })}
                  </div>
                )}
              </div>
              <div style={{width:62}}>
                <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>Need</div>
                <input value={boQty} onChange={function(e){ setBoQty(e.target.value); }} type="number" min="0" placeholder="0"
                  style={{width:'100%',boxSizing:'border-box',padding:'8px 9px',fontSize:14,border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',background:'var(--bg-s)',color:'var(--text-p)'}} />
              </div>
              <div style={{width:96}}>
                <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>Unit</div>
                <input value={boUnit} onChange={function(e){ setBoUnit(e.target.value); }} placeholder="unit"
                  style={{width:'100%',boxSizing:'border-box',padding:'8px 9px',fontSize:14,border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',background:'var(--bg-s)',color:'var(--text-p)'}} />
              </div>
              <button onClick={addOrder}
                style={{padding:'9px 16px',fontSize:14,fontWeight:500,borderRadius:'var(--r-md)',border:'none',background:'var(--green)',color:'#fff',cursor:'pointer',flexShrink:0}}>
                Add
              </button>
            </div>
          </div>

          {orders.length===0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-t)',fontSize:14}}>
              No items yet. Add what you need to buy at this auction.
            </div>
          ) : orders.map(function(o){
            var target = parseFloat(o.target_qty)||0;
            var got = purchasedFor(o.id);
            var met = target>0 && got>=target;
            var pct = target>0 ? Math.min(100, Math.round(got/target*100)) : (got>0?100:0);
            var remain = Math.max(0, target-got);
            var over = got-target;
            return (
              <div key={o.id}
                style={{background:'var(--bg-p)',borderRadius:'var(--r-lg)',
                  border: met ? '1.5px solid var(--green)' : '0.5px solid var(--border)',
                  padding:'12px 14px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <button onClick={function(){ toggleOrderDone(o); }}
                    style={{width:26,height:26,flexShrink:0,borderRadius:7,cursor:'pointer',
                      border: (o.done||met) ? 'none' : '1.5px solid var(--border-md)',
                      background:(o.done||met)?'var(--green)':'transparent',color:'#fff',
                      fontSize:15,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {(o.done||met) ? '\u2713' : ''}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:500,color:'var(--text-p)'}}>{o.item}</div>
                    <div style={{fontSize:12,color:'var(--text-s)'}}>
                      {got} / {target||'\u2014'} {o.unit}
                      {met
                        ? <span style={{color:'var(--green)',fontWeight:500,marginLeft:8}}>&#10003; Quota met{over>0?(' (+'+over+')'):''}</span>
                        : <span style={{color:'#B5740C',marginLeft:8}}>need {remain} more</span>}
                    </div>
                  </div>
                  <button onClick={function(){ setDelOrder(delOrder===o.id?null:o.id); }}
                    style={{fontSize:18,lineHeight:1,color:'var(--text-t)',background:'none',border:'none',cursor:'pointer',padding:'0 2px',flexShrink:0}}>&times;</button>
                </div>

                <div style={{height:6,borderRadius:4,background:'var(--bg-s)',overflow:'hidden',marginBottom:10}}>
                  <div style={{height:'100%',width:pct+'%',background: met?'var(--green)':'#E0A33C',transition:'width .2s'}} />
                </div>

                {delOrder===o.id ? (
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:12,color:'var(--text-s)'}}>Remove from list?</span>
                    <button onClick={function(){ setDelOrder(null); }}
                      style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',border:'0.5px solid var(--border-md)',background:'var(--bg-s)',color:'var(--text-s)',cursor:'pointer',marginLeft:'auto'}}>Cancel</button>
                    <button onClick={function(){ doDelOrder(o.id); }}
                      style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--r-md)',border:'none',background:'#A32D2D',color:'#fff',cursor:'pointer',fontWeight:500}}>Remove</button>
                  </div>
                ) : logFor===o.id ? (
                  <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
                    <div style={{width:72}}>
                      <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3}}>Lot qty</div>
                      <input autoFocus value={logQty} onChange={function(e){ setLogQty(e.target.value); }} type="number" min="0" placeholder="0"
                        style={{width:'100%',boxSizing:'border-box',padding:'8px 9px',fontSize:14,border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',background:'var(--bg-s)',color:'var(--text-p)'}} />
                    </div>
                    <div style={{width:92}}>
                      <div style={{fontSize:10,color:'var(--text-t)',marginBottom:3}}>$ / unit</div>
                      <input value={logPrice} onChange={function(e){ setLogPrice(e.target.value); }} type="number" min="0" placeholder="opt."
                        style={{width:'100%',boxSizing:'border-box',padding:'8px 9px',fontSize:14,border:'0.5px solid var(--border-md)',borderRadius:'var(--r-md)',background:'var(--bg-s)',color:'var(--text-p)'}} />
                    </div>
                    <button onClick={function(){ logLot(o); }}
                      style={{padding:'9px 16px',fontSize:14,fontWeight:500,borderRadius:'var(--r-md)',border:'none',background:'var(--green)',color:'#fff',cursor:'pointer'}}>Log</button>
                    <button onClick={function(){ setLogFor(null); setLogQty(''); setLogPrice(''); }}
                      style={{padding:'9px 12px',fontSize:14,borderRadius:'var(--r-md)',border:'0.5px solid var(--border-md)',background:'var(--bg-s)',color:'var(--text-s)',cursor:'pointer'}}>Cancel</button>
                  </div>
                ) : (
                  <button onClick={function(){ setLogFor(o.id); setLogQty(''); setLogPrice(''); }}
                    style={{fontSize:13,fontWeight:500,padding:'7px 14px',borderRadius:'var(--r-md)',border:'0.5px solid var(--green)',background:'transparent',color:'var(--green)',cursor:'pointer'}}>
                    + Log a lot
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── Bottom nav ── */}
      <div className="np" style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--bg-p)',
        borderTop:'0.5px solid var(--border)',display:'flex',padding:'8px 0 10px'}}>
        {[
          {id:'add',     icon:'+',   label:'Add Lot' },
          {id:'buy',     icon:'\u2611', label:'Buy List'},
          {id:'lists',   icon:'\u2630', label:'Sessions'},
          {id:'reports', icon:'\u2261', label:'Reports' },
          {id:'export',  icon:'\u2399', label:'Print'   },
          {id:'db',      icon:'\u229e', label:'Items'   },
        ].map(function(t) {
          var on = tab === t.id;
          return (
            <button key={t.id} onClick={function(){ setTab(t.id); }}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                background:'none',border:'none',cursor:'pointer',padding:'4px 0'}}>
              <span style={{fontSize:20,lineHeight:1,color: on ? 'var(--green)' : 'var(--text-t)'}}>
                {t.icon}
              </span>
              <span style={{fontSize:9,color: on ? 'var(--green)' : 'var(--text-t)',fontWeight: on ? 600 : 400}}>
                {t.label}
              </span>
              {on && <div style={{width:4,height:4,borderRadius:'50%',background:'var(--green)'}} />}
            </button>
          );
        })}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
